# ~/.config/hypr/hyprlock.conf

general {
  disable_loading_bar = false
  hide_cursor = false
  grace = 2
}

background {
  monitor =
  path = screenshot

  blur_passes = 4
  blur_size = 8
  noise = 0.02
  contrast = 1.1
  brightness = 0.8
  vibrancy = 0.25
  vibrancy_darkness = 0.2
}

# =========================
# Hora
# =========================

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"

  color = rgba(255,255,255,1.0)
  font_size = 96
  font_family = JetBrainsMono Nerd Font Bold

  position = 0, 220
  halign = center
  valign = center
}

# =========================
# Data
# =========================

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %d de %B")"

  color = rgba(220,220,220,0.9)
  font_size = 22
  font_family = JetBrainsMono Nerd Font

  position = 0, 150
  halign = center
  valign = center
}

# =========================
# Usuário
# =========================

label {
  monitor =
  text = Olá, $USER

  color = rgba(255,255,255,0.95)
  font_size = 26
  font_family = JetBrainsMono Nerd Font Bold

  position = 0, 40
  halign = center
  valign = center
}

# =========================
# Caixa de senha
# =========================

input-field {
  monitor =

  size = 340, 58
  outline_thickness = 2

  dots_size = 0.25
  dots_spacing = 0.25
  dots_center = true

  outer_color = rgba(255,255,255,0.15)
  inner_color = rgba(20,20,20,0.65)
  font_color = rgba(255,255,255,1.0)

  fade_on_empty = false
  rounding = 14

  check_color = rgba(8ccf7eaa)
  fail_color = rgba(ff5555aa)

  placeholder_text = <span foreground="##cdd6f4">󰌾 Digite sua senha...</span>

  fail_text = <span foreground="##ff5555">$FAIL <b>Senha incorreta</b></span>

  capslock_color = rgba(f9e2afaa)

  position = 0, -40
  halign = center
  valign = center

  font_family = JetBrainsMono Nerd Font
}

# =========================
# Texto inferior
# =========================

label {
  monitor =
  text = Pressione ENTER para desbloquear

  color = rgba(200,200,200,0.7)
  font_size = 16
  font_family = JetBrainsMono Nerd Font

  position = 0, -95
  halign = center
  valign = center
}

# =========================
# Status bateria
# =========================

label {
  monitor =
  text = cmd[update:30000] echo "󰁹 $(cat /sys/class/power_supply/BAT1/capacity)%"

  color = rgba(255,255,255,0.7)
  font_size = 18
  font_family = JetBrainsMono Nerd Font

  position = -30, 30
  halign = right
  valign = bottom
}