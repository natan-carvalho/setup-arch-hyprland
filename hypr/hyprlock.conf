general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    color = rgba(20, 20, 30, 0.9)
    blur_passes = 2
    blur_size = 8
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.2

    outer_color = rgb(89b4fa)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)

    placeholder_text =Senha...
    fade_on_empty = false
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    font_size = 60
    color = rgb(cdd6f4)
    position = 0, 100
    halign = center
    valign = center
}
